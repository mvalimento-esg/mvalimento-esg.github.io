<!DOCTYPE html>
<html>
<head>
    <title>RuPaul Match</title>
    <style>
        /* Base reset and center alignment for desktop */
        body { 
            background: transparent; 
            color: white; font-family: sans-serif; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            width: 100vw;
            overflow: hidden; 
        }

        /* The 1080x1920 Container */
        #viewport {
            position: relative;
            width: 100vw;
            height: 177.78vw; 
            max-width: 56.25vh; 
            max-height: 100vh;
            background: transparent; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 5vh;
            box-sizing: border-box;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            overflow: hidden; 
            transition: background-image 0.1s ease-in-out; 
        }

        /* LANDSCAPE ADJUSTMENTS */
        @media (orientation: landscape) {
            #viewport {
                flex-direction: row; 
                max-width: 100vw;    
                max-height: 100vh;
                width: 100vw;
                height: 100vh;
                justify-content: flex-end; 
                padding-bottom: 0;
                align-items: center;
            }

            .bg-video {
                width: auto !important;      
                max-width: 45% !important;   
                height: 100% !important;     
                left: 10% !important;        
                object-fit: contain;         
                object-position: center center; 
                transition: opacity 0.3s ease-in-out, left 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            }

            .bg-video.centered {
                left: 50% !important;
                transform: translateX(-50%);
            }

            #bg-image {
                width: 100% !important;
                left: 0 !important;
            }

            #game-container {
                margin-left: auto !important; 
                margin-right: 5% !important; /* Changed to percentage for responsiveness */
                width: auto !important;       
                max-width: 45vw; /* Ensure it doesn't take over half the screen */
                position: relative;
                transform: scale(0.85); /* Scale down the board to fit landscape heights */
                transform-origin: right center;
            }
            
            #start-overlay {
                width: 100%;
                z-index: 100;
            }

            .start-logo {
                width: 20% !important; /* Smaller logo in landscape to leave room for button */
            }
        }

        /* Start Screen Overlay */
        #start-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4); 
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        .start-logo {
            width: 60%; /* Scaled up for portrait as requested */
            height: auto;
            margin-bottom: 25px; 
            z-index: 11; 
        }

        .cta-button {
            width: 200px; 
            height: 100px; 
            background: url('img/STARTMATCHING.webp') no-repeat center center;
            background-size: contain;
            border: none;
            cursor: pointer;
            transition: transform 0.2s ease;
            text-indent: -9999px; 
            background-color: transparent;
            z-index: 10;
        }

        .cta-button:hover {
            transform: scale(1.1);
        }

        /* Dual Background Video Styling */
        .bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1; 
            opacity: 0;
            transition: opacity 0.3s ease-in-out; 
        }

        .bg-video.active {
            opacity: 1;
            z-index: 2; 
        }

        #bg-image {
            position: fixed; 
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('img/01.webp'); 
            background-size: cover; 
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1; 
            opacity: 1; 
        }

        #game-container { 
            position: relative; 
            z-index: 5; 
            border: 4px solid #4e4e6d; 
            border-radius: 10px; 
            background: rgba(255, 255, 255, 0.6); 
            padding: 5px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-left: auto; 
            margin-right: auto; 
            width: fit-content;
            transition: opacity 0.8s ease; 
            max-width: 90vw; /* Responsive width for portrait */
        }

        canvas { 
            cursor: pointer; 
            touch-action: none; 
            max-width: 100%; 
            height: auto; 
            display: block;
        }

        #end-hotspot {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            display: none; 
            background: transparent;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="bg-image"></div> 

    <div id="viewport">
        <a id="end-hotspot" href="#" target="_blank"></a>

        <div id="start-overlay">
            <img src="img/RPDRMQ_logo.webp" alt="RuPaul's Drag Race Match Queen Logo" class="start-logo">
            <button class="cta-button" onclick="startGame()">Start Matching!</button>
        </div>

        <audio id="bg-music" loop>
            <source src="audio/RPDR_MainGame_compressed.mp3" type="audio/mpeg">
        </audio>
        
        <audio id="move-sound">
            <source src="audio/move.mp3" type="audio/mpeg">
        </audio>

        <audio id="match-sound">
            <source src="audio/matched.mp3" type="audio/mpeg">
        </audio>

        <video id="video-a" class="bg-video active" autoplay muted loop playsinline preload="auto">
            <source src="vid/01.mp4" type="video/mp4">
        </video>
        <video id="video-b" class="bg-video" muted playsinline preload="auto"></video>

        <div id="game-container">
            <canvas id="gameCanvas" width="680" height="544"></canvas>
        </div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const gameContainer = document.getElementById('game-container');
const bgMusic = document.getElementById('bg-music');
const moveSound = document.getElementById('move-sound');
const matchSound = document.getElementById('match-sound');
const videoA = document.getElementById('video-a');
const videoB = document.getElementById('video-b');
const bgImage = document.getElementById('bg-image'); 
const endHotspot = document.getElementById('end-hotspot');
const viewport = document.getElementById('viewport');

let currentVideoEl = videoA;
let nextVideoEl = videoB;

const ROWS = 4;
const COLS = 5;
const TILE_SIZE = 136;

const ASSET_SOURCES = [
    'img/RP_Match_Lips_Simple_Gummy.webp',
    'img/RP_Match_Gem_Simple_Gummy.webp',
    'img/RP_Match_Teardrop_Simple_Gummy.webp',
    'img/RP_Match_Crown_Simple_Gummy.webp',
    'img/RP_Match_Shoe_Simple_Gummy.webp'
];

const COLORS = ['#FF4136', '#2ECC40', '#0074D9', '#FFDC00', '#B10DC9'];
const images = [];
let loadedImages = 0;

const bombImg = new Image();
bombImg.src = 'img/bomb.webp';

let grid = []; 
let score = 0;
let swipeStart = null;
let isAnimating = false;
let gameStarted = false; 
let particles = [];
let musicStarted = false;
let matchCount = 0; 

let lastActionTime = Date.now();
let activeHint = null;
const HINT_DELAY = 3000; 

const APP_STORE_LINK = "https://apps.apple.com/ph/app/rupauls-drag-race-match-queen/id6476321629";
const PLAY_STORE_LINK = "https://play.google.com/store/apps/details?id=com.eastsidegames.rupaulmatch";

function getStoreLink() {
    const userAgent = navigator.userAgent || navigator.vendor || window.opera;
    if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
        return APP_STORE_LINK;
    }
    return PLAY_STORE_LINK;
}

ASSET_SOURCES.forEach((src, index) => {
    const img = new Image();
    img.src = src;
    img.onload = () => {
        loadedImages++;
        if (loadedImages === ASSET_SOURCES.length) {
            initGrid();
            requestAnimationFrame(gameLoop);
        }
    };
    images[index] = img;
});

function startGame() {
    gameStarted = true;
    startMusic();
    document.getElementById('start-overlay').style.opacity = '0';
    setTimeout(() => {
        document.getElementById('start-overlay').style.display = 'none';
    }, 500);
    lastActionTime = Date.now();
}

class Particle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.vx = (Math.random() - 0.5) * 20;
        this.vy = (Math.random() - 0.5) * 20;
        this.alpha = 1;
        this.size = Math.random() * 8 + 4;
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.alpha -= 0.02;
    }
    draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

function createParticles(x, y, color) {
    for (let i = 0; i < 12; i++) {
        particles.push(new Particle(x, y, color));
    }
}

function updateAndDrawParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        if (particles[i].alpha <= 0) {
            particles.splice(i, 1);
        } else {
            particles[i].draw();
        }
    }
}

function startMusic() {
    if (!musicStarted) {
        bgMusic.play().catch(e => console.log("Audio play blocked until interaction."));
        musicStarted = true;
    }
}

function initGrid() {
    for (let r = 0; r < ROWS; r++) {
        grid[r] = [];
        for (let c = 0; c < COLS; c++) {
            grid[r][c] = { color: Math.floor(Math.random() * images.length), isBomb: false };
        }
    }
    while(findMatches().size > 0 || findPotentialMatch() === null) {
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                grid[r][c] = { color: Math.floor(Math.random() * images.length), isBomb: false };
            }
        }
    }
}

function ensurePlayable() {
    if (findPotentialMatch() === null) {
        isAnimating = true;
        gameContainer.style.opacity = "0.3";
        setTimeout(() => {
            initGrid();
            gameContainer.style.opacity = "1";
            isAnimating = false;
            resetHint();
            draw();
        }, 600);
    }
}

function drawTile(x, y, colorIndex, isBomb, scale = 1, alpha = 1) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(x + TILE_SIZE / 2, y + TILE_SIZE / 2);
    ctx.scale(scale, scale);
    ctx.translate(-(TILE_SIZE / 2), -(TILE_SIZE / 2));
    if (isBomb) {
        ctx.drawImage(bombImg, 5, 5, TILE_SIZE - 10, TILE_SIZE - 10);
    } else {
        const img = images[colorIndex];
        if (img) ctx.drawImage(img, 5, 5, TILE_SIZE - 10, TILE_SIZE - 10);
    }
    ctx.restore();
}

function gameLoop() {
    if (!isAnimating) {
        if (gameStarted) checkHintTimer();
        draw();
    }
    requestAnimationFrame(gameLoop);
}

function draw(animatingTiles = null, fallingTiles = null, explodingTiles = null) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const pulse = 1 + Math.sin(Date.now() / 200) * 0.05;
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            let x = c * TILE_SIZE;
            let y = r * TILE_SIZE;
            if (animatingTiles && ((r === animatingTiles.r1 && c === animatingTiles.c1) || (r === animatingTiles.r2 && c === animatingTiles.c2))) continue;
            if (fallingTiles && fallingTiles.some(f => f.r === r && f.c === c)) continue;
            if (explodingTiles && explodingTiles.some(e => e.r === r && e.c === c)) continue;
            if (grid[r] && grid[r][c] !== null) {
                let scale = 1;
                if (activeHint && ( (r === activeHint.r1 && c === activeHint.c1) || (r === activeHint.r2 && c === activeHint.c2) )) {
                    scale = pulse;
                }
                drawTile(x, y, grid[r][c].color, grid[r][c].isBomb, scale);
            }
        }
    }
    if (animatingTiles) {
        const t = animatingTiles.progress;
        const dx = (animatingTiles.c2 - animatingTiles.c1) * TILE_SIZE * t;
        const dy = (animatingTiles.r2 - animatingTiles.r1) * TILE_SIZE * t;
        const t1 = grid[animatingTiles.r1][animatingTiles.c1];
        const t2 = grid[animatingTiles.r2][animatingTiles.c2];
        drawTile(animatingTiles.c1 * TILE_SIZE + dx, animatingTiles.r1 * TILE_SIZE + dy, t1.color, t1.isBomb);
        drawTile(animatingTiles.c2 * TILE_SIZE - dx, animatingTiles.r2 * TILE_SIZE - dy, t2.color, t2.isBomb);
    }
    if (fallingTiles) {
        fallingTiles.forEach(tile => {
            const currentY = (tile.fromY + (tile.toY - tile.fromY) * tile.progress) * TILE_SIZE;
            drawTile(tile.c * TILE_SIZE, currentY, tile.color, tile.isBomb);
        });
    }
    if (explodingTiles) {
        explodingTiles.forEach(tile => {
            const scale = 1 + Math.sin(tile.progress * Math.PI) * 0.4;
            drawTile(tile.c * TILE_SIZE, tile.r * TILE_SIZE, tile.color, tile.isBomb, scale);
        });
    }
    updateAndDrawParticles();
}

function checkHintTimer() {
    if (Date.now() - lastActionTime > HINT_DELAY && !activeHint) {
        activeHint = findPotentialMatch();
    }
}

function resetHint() {
    lastActionTime = Date.now();
    activeHint = null;
}

function findPotentialMatch() {
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS - 1; c++) {
            swap(r, c, r, c + 1);
            const matches = findMatches();
            swap(r, c, r, c + 1); 
            if (matches.size > 0) return { r1: r, c1: c, r2: r, c2: c + 1 };
        }
    }
    for (let r = 0; r < ROWS - 1; r++) {
        for (let c = 0; c < COLS; c++) {
            swap(r, c, r + 1, c);
            const matches = findMatches();
            swap(r, c, r + 1, c); 
            if (matches.size > 0) return { r1: r, c1: c, r2: r + 1, c2: c };
        }
    }
    return null;
}

function findMatches() {
    let toRemove = new Set();
    for (let r = 0; r < ROWS; r++) {
        let matchLen = 1;
        for (let c = 0; c < COLS; c++) {
            let check = (c === COLS - 1);
            if (!check) {
                if (grid[r][c] && grid[r][c+1] && (grid[r][c].color === grid[r][c+1].color)) matchLen++;
                else check = true;
            }
            if (check) {
                if (matchLen >= 3) for (let i = 0; i < matchLen; i++) toRemove.add(`${r},${c-i}`);
                matchLen = 1;
            }
        }
    }
    for (let c = 0; c < COLS; c++) {
        let matchLen = 1;
        for (let r = 0; r < ROWS; r++) {
            let check = (r === ROWS - 1);
            if (!check) {
                if (grid[r][c] && grid[r+1][c] && (grid[r][c].color === grid[r+1][c].color)) matchLen++;
                else check = true;
            }
            if (check) {
                if (matchLen >= 3) for (let i = 0; i < matchLen; i++) toRemove.add(`${r-i},${c}`);
                matchLen = 1;
            }
        }
    }
    return toRemove;
}

function animateExplosion(tiles, callback) {
    isAnimating = true;
    const duration = 300;
    const startTime = performance.now();
    function step(now) {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / duration, 1);
        tiles.forEach(t => t.progress = progress);
        draw(null, null, tiles);
        if (progress < 1 || particles.length > 0) requestAnimationFrame(step);
        else { isAnimating = false; callback(); }
    }
    requestAnimationFrame(step);
}

function animateSwap(r1, c1, r2, c2, callback) {
    isAnimating = true;
    resetHint();
    if (moveSound) {
        moveSound.currentTime = 0;
        moveSound.play().catch(e => console.log("Audio play blocked"));
    }
    const duration = 200;
    const startTime = performance.now();
    function step(now) {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / duration, 1);
        draw({ r1, c1, r2, c2, progress });
        if (progress < 1) requestAnimationFrame(step);
        else { 
            swap(r1, c1, r2, c2); 
            isAnimating = false; 
            draw(); 
            if(callback) callback(); 
        }
    }
    requestAnimationFrame(step);
}

function animateFall(fallingTiles, callback) {
    isAnimating = true;
    const duration = 400;
    const startTime = performance.now();
    function step(now) {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const easeProgress = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress);
        fallingTiles.forEach(t => t.progress = easeProgress);
        draw(null, fallingTiles);
        if (progress < 1) requestAnimationFrame(step);
        else { isAnimating = false; draw(); callback(); }
    }
    requestAnimationFrame(step);
}

function getCoords(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { 
        c: Math.floor(((clientX - rect.left) * scaleX) / TILE_SIZE), 
        r: Math.floor(((clientY - rect.top) * scaleY) / TILE_SIZE), 
        x: clientX, 
        y: clientY 
    };
}

const startAction = (e) => { 
    if (!gameStarted || isAnimating) return; 
    resetHint(); 
    swipeStart = getCoords(e); 
};
const endAction = (e) => {
    if (!gameStarted || !swipeStart || isAnimating) return;
    const clientX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
    const clientY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
    const dx = clientX - swipeStart.x;
    const dy = clientY - swipeStart.y;
    const threshold = 15;
    let r1 = swipeStart.r, c1 = swipeStart.c;
    let r2 = r1, c2 = c1;
    if (Math.abs(dx) > Math.abs(dy)) { if (Math.abs(dx) > threshold) c2 += (dx > 0 ? 1 : -1); }
    else { if (Math.abs(dy) > threshold) r2 += (dy > 0 ? 1 : -1); }
    if (r2 >= 0 && r2 < ROWS && c2 >= 0 && c2 < COLS && (r1 !== r2 || c1 !== c2)) {
        animateSwap(r1, c1, r2, c2, () => {
            const hasMatches = checkMatches(false);
            if (!hasMatches) {
                setTimeout(() => animateSwap(r1, c1, r2, c2), 100);
            }
        });
    }
    swipeStart = null;
};

canvas.addEventListener('mousedown', startAction);
canvas.addEventListener('mouseup', endAction);
canvas.addEventListener('touchstart', startAction, {passive: false});
canvas.addEventListener('touchend', endAction, {passive: false});

function swap(r1, c1, r2, c2) {
    let temp = grid[r1][c1];
    grid[r1][c1] = grid[r2][c2];
    grid[r2][c2] = temp;
}

function switchVideo(newSrc, isLooping, onEndCallback = null) {
    const oldVideo = currentVideoEl;
    const newVideo = nextVideoEl;

    newVideo.src = newSrc;
    newVideo.loop = isLooping;
    newVideo.onended = onEndCallback;
    newVideo.load();

    newVideo.oncanplaythrough = function() {
        newVideo.play().then(() => {
            const checkStarted = () => {
                if (newVideo.currentTime > 0) {
                    newVideo.classList.add('active');
                    oldVideo.classList.remove('active');
                    
                    if (newSrc.includes('LogoLoop_loop.mp4')) {
                        newVideo.classList.add('centered');
                    } else {
                        newVideo.classList.remove('centered');
                    }

                    currentVideoEl = newVideo;
                    nextVideoEl = oldVideo;
                    newVideo.removeEventListener('timeupdate', checkStarted);
                }
            };
            newVideo.addEventListener('timeupdate', checkStarted);
        }).catch(err => console.log("Video play error:", err));
        
        newVideo.oncanplaythrough = null;
    };
}

function checkMatches(isChainReaction = true) {
    let toRemove = new Set();
    let bombsToCreate = [];
    let explosionData = [];
    const matchesFromGrid = findMatches();
    matchesFromGrid.forEach(m => toRemove.add(m));
    for (let r = 0; r < ROWS; r++) {
        let matchLen = 1;
        for (let c = 0; c < COLS; c++) {
            let check = (c === COLS - 1);
            if (!check) {
                if (grid[r][c] && grid[r][c+1] && grid[r][c].color === grid[r][c+1].color && !grid[r][c].isBomb && !grid[r][c+1].isBomb) matchLen++;
                else check = true;
            }
            if (check) {
                if (matchLen >= 4) bombsToCreate.push({r, c: c - Math.floor(matchLen/2), color: grid[r][c].color});
                matchLen = 1;
            }
        }
    }
    for (let c = 0; c < COLS; c++) {
        let matchLen = 1;
        for (let r = 0; r < ROWS; r++) {
            let check = (r === ROWS - 1);
            if (!check) {
                if (grid[r][c] && grid[r+1][c] && grid[r][c].color === grid[r+1][c].color && !grid[r][c].isBomb && !grid[r+1][c].isBomb) matchLen++;
                else check = true;
            }
            if (check) {
                if (matchLen >= 4) bombsToCreate.push({r: r - Math.floor(matchLen/2), c, color: grid[r][c].color});
                matchLen = 1;
            }
        }
    }
    if (toRemove.size === 0) {
        resetHint();
        ensurePlayable(); 
        return false;
    }
    if (matchSound) {
        matchSound.currentTime = 0;
        matchSound.play().catch(e => console.log("Audio play blocked"));
    }
    if (!isChainReaction) {
        matchCount++;
        if (matchCount === 1) {
            switchVideo('vid/02a.mp4', false, () => { switchVideo('vid/02.mp4', true); });
        } else if (matchCount === 2) {
            switchVideo('vid/03a.mp4', false, () => { switchVideo('vid/03.mp4', true); });
        } else if (matchCount === 3) {
            switchVideo('vid/04a.mp4', false, () => { switchVideo('vid/04.mp4', true); });
        } else if (matchCount === 4) {
            isAnimating = true; 
            gameContainer.style.opacity = '0';
            setTimeout(() => { gameContainer.style.display = 'none'; }, 800);
            switchVideo('vid/05.mp4', false, () => {
                switchVideo('vid/LogoLoop_loop.mp4', true);
                endHotspot.href = getStoreLink();
                endHotspot.style.display = 'block';
            });
        }
    }
    let hasBombTriggered = false;
    toRemove.forEach(pos => {
        const [r, c] = pos.split(',').map(Number);
        if (grid[r][c] && grid[r][c].isBomb) {
            hasBombTriggered = true;
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    let nr = r + dr, nc = c + dc;
                    if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                        createParticles(nc * TILE_SIZE + TILE_SIZE/2, nr * TILE_SIZE + TILE_SIZE/2, COLORS[grid[nr][nc]?.color || 0]);
                        if (!toRemove.has(`${nr},${nc}`)) {
                            explosionData.push({ r: nr, c: nc, color: grid[nr][nc].color, isBomb: grid[nr][nc].isBomb, progress: 0 });
                        }
                        toRemove.add(`${nr},${nc}`);
                    }
                }
            }
        }
    });
    const processRemoval = () => {
        score += toRemove.size * 10;
        toRemove.forEach(pos => { const [r, c] = pos.split(',').map(Number); if(grid[r]) grid[r][c] = null; });
        bombsToCreate.forEach(b => { grid[b.r][b.c] = { color: b.color, isBomb: true }; });
        let fallingTiles = [];
        for (let c = 0; c < COLS; c++) {
            let emptySpaces = 0;
            for (let r = ROWS - 1; r >= 0; r--) {
                if (grid[r][c] === null) emptySpaces++;
                else if (emptySpaces > 0) {
                    fallingTiles.push({ color: grid[r][c].color, isBomb: grid[r][c].isBomb, c: c, fromY: r, toY: r + emptySpaces, progress: 0, r: r + emptySpaces });
                    grid[r + emptySpaces][c] = grid[r][c];
                    grid[r][c] = null;
                }
            }
            for (let i = 0; i < emptySpaces; i++) {
                let newColor = Math.floor(Math.random() * images.length);
                let targetRow = emptySpaces - 1 - i;
                fallingTiles.push({ color: newColor, isBomb: false, c: c, fromY: -(i + 1), toY: targetRow, progress: 0, r: targetRow });
                grid[targetRow][c] = { color: newColor, isBomb: false };
            }
        }
        setTimeout(() => animateFall(fallingTiles, () => {
            const secondaryMatches = checkMatches(true);
            if (!secondaryMatches) {
                ensurePlayable(); 
            }
        }), 100);
    };
    if (hasBombTriggered) animateExplosion(explosionData, processRemoval);
    else processRemoval();
    return true;
}
</script>
